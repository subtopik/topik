version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    groups:
      ajv:
        patterns:
          - "ajv"
          - "ajv-formats"
      typescript:
        patterns:
          - "typescript"
          - "@typescript/*"
