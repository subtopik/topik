name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: read-all

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: "22"
          cache: true

      - run: vp install

      - run: vp run -r build

      - run: vp check

      - run: vp test

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: "22"
          cache: true

      - run: vp install

      - run: vp run -r build

      - name: Publish packages
        run: |
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            private=$(node -p "require('./$pkg').private || false")
            if [ "$private" = "true" ]; then
              continue
            fi

            version=$(node -p "require('./$pkg').version")
            if echo "$version" | grep -q "alpha"; then
              tag=alpha
            elif echo "$version" | grep -q "beta"; then
              tag=beta
            elif echo "$version" | grep -q "rc"; then
              tag=rc
            else
              tag=latest
            fi

            echo "Publishing $dir@$version with tag $tag"
            cd "$dir"
            vp pm pack -- --pack-destination .
            tarball=$(ls -t *.tgz | head -n 1)
            npx -y npm@11.13.0 publish "$tarball" --provenance --access public --tag "$tag"
            cd "$GITHUB_WORKSPACE"
          done
