name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: read-all

jobs:
  ci:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - run: vp install

      - run: vp run -r build

      - run: vp check

      - run: vp test

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run -r build

      - name: Publish packages
        run: |
          packages=(
            packages/content-schema
            packages/schema
            packages/core
            packages/content-react
            packages/cli
            packages/codemod
          )

          for dir in "${packages[@]}"; do
            pkg="$dir/package.json"
            name=$(jq -r .name "$pkg")
            version=$(jq -r .version "$pkg")

            if npx -y npm@11.13.0 view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version because it is already published"
              continue
            fi

            if [[ "$version" == *"-alpha"* ]]; then
              tag=alpha
            elif [[ "$version" == *"-beta"* ]]; then
              tag=beta
            elif [[ "$version" == *"-rc"* ]]; then
              tag=rc
            else
              tag=latest
            fi

            echo "Publishing $name@$version with tag $tag"
            cd "$dir"
            vp pm pack -- --pack-destination .
            tarball=$(ls -t *.tgz | head -n 1)
            npx -y npm@11.13.0 publish "$tarball" --provenance --access public --tag "$tag"
            cd "$GITHUB_WORKSPACE"
          done
