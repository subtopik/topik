name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: read-all

jobs:
  ci:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - run: vp install

      - run: vp run -r build

      - run: vp check

      - run: vp test

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run -r build

      - name: Publish packages
        run: |
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            private=$(node -p "require('./$pkg').private || false")
            if [ "$private" = "true" ]; then
              continue
            fi

            version=$(node -p "require('./$pkg').version")
            if echo "$version" | grep -q "alpha"; then
              tag=alpha
            elif echo "$version" | grep -q "beta"; then
              tag=beta
            elif echo "$version" | grep -q "rc"; then
              tag=rc
            else
              tag=latest
            fi

            echo "Publishing $dir@$version with tag $tag"
            cd "$dir"
            vp pm pack -- --pack-destination .
            tarball=$(ls -t *.tgz | head -n 1)
            npx -y npm@11.13.0 publish "$tarball" --provenance --access public --tag "$tag"
            cd "$GITHUB_WORKSPACE"
          done
