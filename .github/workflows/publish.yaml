name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: read-all

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          node-version: "22"
          cache: true

      - run: vp install

      - run: vp run -r build

      - run: vp check

      - run: vp test

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          node-version: "22"
          cache: true

      - run: vp install

      - run: vp run -r build

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.13.0

      - name: Publish packages
        run: |
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            private=$(node -p "require('./$pkg').private || false")
            if [ "$private" = "true" ]; then
              continue
            fi

            version=$(node -p "require('./$pkg').version")
            if echo "$version" | grep -q "alpha"; then
              tag=alpha
            elif echo "$version" | grep -q "beta"; then
              tag=beta
            elif echo "$version" | grep -q "rc"; then
              tag=rc
            else
              tag=latest
            fi

            echo "Publishing $dir@$version with tag $tag"
            cd "$dir"
            pnpm pack --pack-destination .
            tarball=$(ls -t *.tgz | head -n 1)
            npm publish "$tarball" --provenance --access public --tag "$tag"
            cd "$GITHUB_WORKSPACE"
          done
