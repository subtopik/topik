  "@markdoc/markdoc": ^0.5.8
  "@types/bun": ^1.3.14
  "@types/node": 22.20.1
  "@typescript/native-preview": 7.0.0-dev.20260707.2
  github-slugger: ^2.0.0
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4

catalogMode: prefer
minimumReleaseAgeExclude:
