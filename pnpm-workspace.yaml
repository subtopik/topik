packages:
  - packages/*
  - tools/*

allowBuilds:
  esbuild: true
  sharp: true

catalog:
  "@drizzle-team/brocli": ^0.12.0
  "@markdoc/markdoc": ^0.5.7
  "@types/bun": ^1.3.14
  "@types/node": ^25.9.1
  "@typescript/native-preview": 7.0.0-dev.20260602.1
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
minimumReleaseAgeExclude:
  - astro@6.4.4
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
