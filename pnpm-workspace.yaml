  "@types/bun": ^1.3.13
  "@types/mdast": ^4.0.4
  "@types/node": ^25
  "@typescript/native-preview": 7.0.0-dev.20260424.1
  remark-parse: ^11.0.0
  typescript: ^6
  unified: ^11.0.5
  unist-util-visit: ^5.1.0
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.18
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
